<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odin Library</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="navbar">
        <h1>Odin Library</h1>
        <div class="info">
            <div class="book-num">
                <p>Books</p>
                <p class="info-val">0</p>
            </div>
            <div class="complete-books">
                <p>Complete Books</p>
                <p class="info-val">0</p>
            </div>
            <div class="incomplete-books">
                <p>Incomplete Books</p>
                <p class="info-val">0</p>
            </div>
            <div class="total-pages">
                <p>Total Pages</p>
                <p class="info-val">0</p>
            </div>
        </div>
        <button class="new-book-btn">+</button>
    </div>
    <!-- container for all individual books in the library -->
    <div class="container">
        <!-- Form for creating a new book -->
        <dialogue>
            <form method="dialogue">
                <div class="form-header">
                    <h1>Add a Book</h1>
                    <button class="form-exit-btn">
                        <!-- Have SVG go here -->
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                            <path
                                d="M19,6.41L17.59,5L12,10.59L6.41,5L5,6.41L10.59,12L5,17.59L6.41,19L12,13.41L17.59,19L19,17.59L13.41,12L19,6.41Z" />
                        </svg>
                    </button>
                </div>
                <div class="form-group">
                    <label for="title">Title</label>
                    <input type="text" id="title" placeholder="1984">
                </div>
                <div class="form-group">
                    <label for="author">Author</label>
                    <input type="text" id="author" placeholder="George Orwell">
                </div>
                <div class="form-group">
                    <label for="pages">Pages</label>
                    <input type="text" id="pages" placeholder="328">
                </div>
                <fieldset class="read-group">
                    <label for="read" class="radio-label">Read</label>
                    <input type="radio" id="read" name="has-read" value="read" checked>
                    <label for="unread" class="radio-label">Unread</label>
                    <input type="radio" id="unread" name="has-read" value="unread">
                </fieldset>
                <div class="add-btn-container">
                    <button>Add Book</button>
                </div>
            </form>
        </dialogue>
    </div>
    <script src="library.js"></script>
</body>

</html>
