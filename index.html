<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odin Library</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <button class="new-book-btn">+</button>
    <!-- container for all individual books in the library -->
    <dialogue>
        <form method="dialogue">
            <label for="title">Title</label>
            <input type="text" id="title" placeholder="1984">
            <label for="author">Author</label>
            <input type="text" id="author" placeholder="George Orwell">
            <label for="pages">Pages</label>
            <input type="text" id="pages" placeholder="328">
            <label for="has-read">Read:</label>
            <input type="checkbox" id="has-read">
        </form>
    </dialogue>
    <div class="container"></div>
    <script src="library.js"></script>
</body>

</html>
